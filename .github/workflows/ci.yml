name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test (@tyvm/knowhow)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build knowhow-tunnel (workspace dependency)
        run: npm run build
        working-directory: packages/knowhow-tunnel

      - name: TypeScript compile check
        run: npx tsc --noEmit
        working-directory: packages/knowhow

      - name: Run tests
        run: npm test -- --testPathIgnorePatterns="tests/manual" --forceExit
        working-directory: packages/knowhow
        env:
          CI: true

  lint:
    name: Lint & Dep Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check for unused dependencies
        run: npx depcheck --config=.depcheckrc
        working-directory: packages/knowhow

  test-swagger-mcp:
    name: Test (@tyvm/swagger-mcp)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --forceExit
        working-directory: packages/swagger-mcp
        env:
          CI: true

  test-knowhow-module-ast:
    name: Test (@tyvm/knowhow-module-ast)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build knowhow-tunnel (workspace dependency)
        run: npm run build
        working-directory: packages/knowhow-tunnel

      - name: Build knowhow (peer dependency)
        run: npm run compile
        working-directory: packages/knowhow

      - name: Run tests
        run: npm test -- --forceExit
        working-directory: packages/knowhow-module-ast
        env:
          CI: true

  build-knowhow-module-s3:
    name: Build (@tyvm/knowhow-module-s3)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build knowhow-tunnel (workspace dependency)
        run: npm run build
        working-directory: packages/knowhow-tunnel

      - name: Build knowhow (peer dependency)
        run: npm run compile
        working-directory: packages/knowhow

      - name: TypeScript compile check
        run: npx tsc --noEmit
        working-directory: packages/knowhow-module-s3

  check-isolated-deps:
    name: Isolated Dep Check (@tyvm/knowhow)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run isolated dependency check
        run: bash scripts/check-isolated-deps.sh
        working-directory: packages/knowhow

  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high severity)
        # Fail on HIGH or CRITICAL vulnerabilities
        run: npm audit --audit-level=high
        working-directory: packages/knowhow
        continue-on-error: true  # Remove this once Phase 1 cleanup lands and audit is clean

  build-knowhow-module-script:
    name: Build (@tyvm/knowhow-module-script)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build knowhow-tunnel (workspace dependency)
        run: npm run build
        working-directory: packages/knowhow-tunnel

      - name: Build knowhow (peer dependency)
        run: npm run compile
        working-directory: packages/knowhow

      - name: TypeScript compile check
        run: npx tsc --noEmit
        working-directory: packages/knowhow-module-script

      - name: Verify isolated-vm loads correctly
        run: node --no-node-snapshot -e "const ivm = require('isolated-vm'); console.log('isolated-vm loaded OK, version check passed');"
        working-directory: packages/knowhow-module-script
